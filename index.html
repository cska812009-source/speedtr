<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Скорочтение для детей</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Neue', 'Comic Neue', 'Segoe UI', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Контейнеры */
        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Карточки */
        .card {
            background: white;
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            border: 3px solid #ffd966;
        }

        /* Шапка */
        .header {
            background: white;
            border-radius: 40px;
            padding: 15px 25px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 3px solid #ffd966;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f0f8ff;
            padding: 8px 15px;
            border-radius: 50px;
        }

        .btn-logout {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
        }

        /* Кнопки выбора упражнения */
        .exercise-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .ex-btn {
            flex: 1;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.2s;
            background: white;
            color: #4facfe;
            border: 3px solid #ffd966;
        }

        .ex-btn.active {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            border-color: white;
        }

        .ex-btn:active {
            transform: scale(0.95);
        }

        /* Экран со словами */
        .word-screen {
            background: #f0f8ff;
            border-radius: 50px;
            padding: 50px 20px;
            text-align: center;
            font-size: 56px;
            font-weight: bold;
            color: #2c3e66;
            margin: 20px 0;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #ffd966;
            box-shadow: inset 0 0 20px rgba(79,172,254,0.2);
        }

        /* Ползунок скорости */
        .speed-area {
            background: #fff9e6;
            padding: 15px;
            border-radius: 50px;
            margin: 15px 0;
            text-align: center;
        }

        .speed-label {
            font-size: 18px;
            font-weight: bold;
            color: #ff8c42;
            margin-bottom: 10px;
        }

        .speed-slider {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: #ffd966;
            border-radius: 10px;
        }

        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            background: #ff8c42;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
        }

        .speed-value {
            font-size: 28px;
            font-weight: bold;
            color: #ff8c42;
            margin-top: 8px;
        }

        /* Кнопки управления */
        .game-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }

        .game-btn {
            padding: 12px 25px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.1s;
        }

        .game-btn:active {
            transform: scale(0.95);
        }

        .btn-start {
            background: #6bcf7f;
            color: white;
            box-shadow: 0 5px 0 #2d6a3b;
        }

        .btn-pause {
            background: #ffb347;
            color: white;
            box-shadow: 0 5px 0 #cc7a00;
        }

        .btn-stop {
            background: #ff6b6b;
            color: white;
            box-shadow: 0 5px 0 #b34747;
        }

        /* Область вопросов */
        .questions-box {
            background: #fff9e6;
            border-radius: 40px;
            padding: 20px;
            margin-top: 20px;
        }

        .question-item {
            background: white;
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 15px solid #4facfe;
        }

        .question-text {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 12px;
            color: #2c3e66;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .option {
            background: #f0f8ff;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .option.selected {
            background: #4facfe;
            color: white;
        }

        .submit-btn {
            background: #6bcf7f;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .result-badge {
            text-align: center;
            padding: 15px;
            border-radius: 50px;
            margin-top: 15px;
            font-weight: bold;
            font-size: 18px;
        }

        .result-badge.good {
            background: #d4edda;
            color: #155724;
        }

        /* Форма входа (упрощённая для детей) */
        .auth-card {
            background: white;
            border-radius: 60px;
            padding: 40px 30px;
            text-align: center;
        }

        .auth-card h2 {
            color: #4facfe;
            margin-bottom: 25px;
            font-size: 32px;
        }

        .auth-input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 3px solid #ffd966;
            border-radius: 60px;
            font-size: 16px;
            font-family: inherit;
            text-align: center;
        }

        .auth-btn {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .switch-auth {
            margin-top: 15px;
            color: #4facfe;
            cursor: pointer;
            text-decoration: underline;
        }

        .progress {
            font-size: 18px;
            text-align: center;
            margin: 10px 0;
            color: #ff8c42;
            font-weight: bold;
        }

        @media (max-width: 550px) {
            .word-screen {
                font-size: 40px;
                padding: 35px 15px;
            }
            .game-btn {
                padding: 10px 18px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- Экран входа -->
    <div id="authScreen">
        <div class="auth-card">
            <h2>📚 Читай-ка! 🚀</h2>
            <div id="loginPanel">
                <input type="email" id="loginEmail" class="auth-input" placeholder="📧 Твой email">
                <input type="password" id="loginPassword" class="auth-input" placeholder="🔒 Пароль (не меньше 6 букв)">
                <button class="auth-btn" id="loginBtn">🚪 Войти</button>
                <div class="switch-auth" id="showRegPanel">📝 Нет аккаунта? Создать!</div>
            </div>
            <div id="regPanel" style="display:none;">
                <input type="email" id="regEmail" class="auth-input" placeholder="📧 Твой email">
                <input type="password" id="regPassword" class="auth-input" placeholder="🔒 Пароль (6+ букв)">
                <input type="password" id="regPasswordConfirm" class="auth-input" placeholder="🔄 Повтори пароль">
                <button class="auth-btn" id="registerBtn">✅ Зарегистрироваться</button>
                <div class="switch-auth" id="showLoginPanel">◀ Уже есть аккаунт? Войти</div>
            </div>
            <div id="authMessage" style="color:#ff6b6b; margin-top:15px;"></div>
        </div>
    </div>

    <!-- Игровой экран -->
    <div id="gameScreen" style="display:none;">
        <div class="header">
            <div class="logo">🐼 Читай-ка!</div>
            <div class="user-info">
                <span id="userName">🤗</span>
                <button class="btn-logout" id="logoutBtn">🚪 Выйти</button>
            </div>
        </div>

        <div class="exercise-buttons">
            <button class="ex-btn active" data-ex="run">🏃‍♂️ Бегущие слова</button>
            <button class="ex-btn" data-ex="quiz">🧠 Понял? Ответь!</button>
        </div>

        <!-- Упражнение 1: бегущие слова -->
        <div id="runExercise" class="card">
            <div class="progress">📖 Слово <span id="wordCounter">0</span> из <span id="totalCounter">0</span></div>
            <div class="word-screen" id="wordDisplay">🌟 Нажми СТАРТ</div>
            <div class="speed-area">
                <div class="speed-label">⚡ Скорость чтения</div>
                <input type="range" id="speedSlider" class="speed-slider" min="200" max="1000" step="10" value="450">
                <div class="speed-value" id="speedValue">450 мс</div>
                <div style="display: flex; gap: 8px; justify-content: center; margin-top: 10px;">
                    <button class="preset" data-speed="700">🐢 Медленно</button>
                    <button class="preset" data-speed="450">⚡ Средне</button>
                    <button class="preset" data-speed="250">🐆 Быстро</button>
                </div>
            </div>
            <div class="game-buttons">
                <button class="game-btn btn-start" id="startRunBtn">▶ СТАРТ</button>
                <button class="game-btn btn-pause" id="pauseRunBtn">⏸ ПАУЗА</button>
                <button class="game-btn btn-stop" id="stopRunBtn">⏹ СТОП</button>
            </div>
        </div>

        <!-- Упражнение 2: вопросы -->
        <div id="quizExercise" class="card" style="display:none;">
            <div class="word-screen" id="quizText">📖 Нажми "Новый текст"</div>
            <button class="game-btn btn-start" id="newTextBtn" style="width:100%; margin-bottom:15px;">✨ Новый текст</button>
            <div id="quizQuestions" class="questions-box" style="display:none;">
                <div id="questionsList"></div>
                <button class="submit-btn" id="checkQuizBtn">✅ Проверить ответы</button>
                <div id="quizResult" class="result-badge"></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCApGTxPoGJlNDQByASNPlu_XAIpv2z6LI",
        authDomain: "speedtr-75911.firebaseapp.com",
        projectId: "speedtr-75911",
        storageBucket: "speedtr-75911.firebasestorage.app",
        messagingSenderId: "447910342060",
        appId: "1:447910342060:web:18fad38b7493e23efd1e09"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // DOM элементы
    const authScreen = document.getElementById('authScreen');
    const gameScreen = document.getElementById('gameScreen');
    const userNameSpan = document.getElementById('userName');
    
    // Панели входа
    const loginPanel = document.getElementById('loginPanel');
    const regPanel = document.getElementById('regPanel');
    const showRegPanel = document.getElementById('showRegPanel');
    const showLoginPanel = document.getElementById('showLoginPanel');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const authMessage = document.getElementById('authMessage');

    // Упражнение 1
    let wordsList = [];
    let currentWordIndex = 0;
    let runInterval = null;
    let isRunning = false;
    let currentSpeed = 450;
    
    const wordDisplay = document.getElementById('wordDisplay');
    const speedSlider = document.getElementById('speedSlider');
    const speedValue = document.getElementById('speedValue');
    const startRunBtn = document.getElementById('startRunBtn');
    const pauseRunBtn = document.getElementById('pauseRunBtn');
    const stopRunBtn = document.getElementById('stopRunBtn');
    const wordCounterSpan = document.getElementById('wordCounter');
    const totalCounterSpan = document.getElementById('totalCounter');

    // Упражнение 2
    const quizTextDiv = document.getElementById('quizText');
    const newTextBtn = document.getElementById('newTextBtn');
    const quizQuestionsDiv = document.getElementById('quizQuestions');
    const questionsListDiv = document.getElementById('questionsList');
    const checkQuizBtn = document.getElementById('checkQuizBtn');
    const quizResultDiv = document.getElementById('quizResult');

    // 📚 Детские тексты с вопросами
    const stories = [
        {
            text: "Жил-был маленький ёжик. Он очень любил собирать грибы и ягоды. Однажды ёжик нашёл большую корзину с малиной.",
            questions: [
                { text: "Кого звали маленький ёжик?", options: ["Зайчика", "Ёжика", "Медвежонка"], correct: 1 },
                { text: "Что любил собирать ёжик?", options: ["Грибы и ягоды", "Камешки", "Цветы"], correct: 0 },
                { text: "Что нашёл ёжик однажды?", options: ["Корзину с малиной", "Клад", "Домик"], correct: 0 }
            ]
        },
        {
            text: "Котёнок Мурзик очень хотел научиться летать. Он прыгнул с крыши, но не полетел, а упал в сугроб. Хорошо, что снег был мягкий!",
            questions: [
                { text: "Как звали котёнка?", options: ["Барсик", "Мурзик", "Рыжик"], correct: 1 },
                { text: "Куда прыгнул котёнок?", options: ["С крыши", "С дерева", "С забора"], correct: 0 },
                { text: "Куда он упал?", options: ["В лужу", "В сугроб", "В песок"], correct: 1 }
            ]
        },
        {
            text: "Девочка Маша помогала бабушке поливать цветы. Каждое утро она брала лейку и поливала ромашки и колокольчики. Цветы росли красивые!",
            questions: [
                { text: "Как звали девочку?", options: ["Даша", "Маша", "Саша"], correct: 1 },
                { text: "Кому помогала Маша?", options: ["Дедушке", "Бабушке", "Маме"], correct: 1 },
                { text: "Какие цветы поливала Маша?", options: ["Розы", "Ромашки и колокольчики", "Тюльпаны"], correct: 1 }
            ]
        }
    ];

    let currentStory = null;
    let selectedAnswers = {};

    function loadRandomStory() {
        currentStory = stories[Math.floor(Math.random() * stories.length)];
        quizTextDiv.textContent = currentStory.text;
        buildQuestions();
        quizResultDiv.innerHTML = '';
        quizResultDiv.className = 'result-badge';
        selectedAnswers = {};
    }

    function buildQuestions() {
        if (!currentStory) return;
        questionsListDiv.innerHTML = '';
        currentStory.questions.forEach((q, idx) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question-item';
            qDiv.innerHTML = `
                <div class="question-text">${idx+1}. ${q.text}</div>
                <div class="options" data-qidx="${idx}">
                    ${q.options.map((opt, optIdx) => `
                        <div class="option" data-optidx="${optIdx}">${opt}</div>
                    `).join('')}
                </div>
            `;
            questionsListDiv.appendChild(qDiv);
        });
        // Добавляем обработчики
        document.querySelectorAll('.options').forEach(optGroup => {
            const qIndex = parseInt(optGroup.dataset.qidx);
            optGroup.querySelectorAll('.option').forEach(opt => {
                opt.addEventListener('click', () => {
                    optGroup.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                    selectedAnswers[qIndex] = parseInt(opt.dataset.optidx);
                });
            });
        });
        quizQuestionsDiv.style.display = 'block';
    }

    function checkQuiz() {
        if (!currentStory) return;
        let correct = 0;
        currentStory.questions.forEach((q, idx) => {
            if (selectedAnswers[idx] === q.correct) correct++;
        });
        const total = currentStory.questions.length;
        if (correct === total) {
            quizResultDiv.innerHTML = `🎉 Молодец! ${correct} из ${total} правильных! 🎉`;
            quizResultDiv.className = 'result-badge good';
        } else {
            quizResultDiv.innerHTML = `📚 Правильных ответов: ${correct} из ${total}. Попробуй ещё раз! 🌟`;
            quizResultDiv.className = 'result-badge';
        }
    }

    // --- Бегущие слова ---
    function pickRandomText() {
        const randomStory = stories[Math.floor(Math.random() * stories.length)];
        wordsList = randomStory.text.split(' ');
        currentWordIndex = 0;
        totalCounterSpan.textContent = wordsList.length;
        wordCounterSpan.textContent = "0";
        if (!isRunning) wordDisplay.textContent = wordsList[0] || "Готово!";
    }

    function showNextWord() {
        if (currentWordIndex < wordsList.length) {
            wordDisplay.textContent = wordsList[currentWordIndex];
            wordCounterSpan.textContent = currentWordIndex + 1;
            currentWordIndex++;
        } else {
            stopRunning();
            wordDisplay.textContent = "🎉 Молодец! Текст закончен! 🎉";
        }
    }

    function startRunning() {
        if (isRunning) return;
        if (currentWordIndex >= wordsList.length) pickRandomText();
        isRunning = true;
        runInterval = setInterval(() => {
            showNextWord();
            if (currentWordIndex > wordsList.length) stopRunning();
        }, currentSpeed);
    }

    function pauseRunning() {
        if (runInterval) clearInterval(runInterval);
        isRunning = false;
        runInterval = null;
    }

    function stopRunning() {
        pauseRunning();
        pickRandomText();
    }

    // События скорости
    speedSlider.addEventListener('input', (e) => {
        currentSpeed = parseInt(e.target.value);
        speedValue.textContent = currentSpeed + " мс";
        if (isRunning) {
            pauseRunning();
            startRunning();
        }
    });
    document.querySelectorAll('.preset').forEach(btn => {
        btn.addEventListener('click', () => {
            const speed = parseInt(btn.dataset.speed);
            speedSlider.value = speed;
            currentSpeed = speed;
            speedValue.textContent = speed + " мс";
            if (isRunning) {
                pauseRunning();
                startRunning();
            }
        });
    });

    startRunBtn.addEventListener('click', startRunning);
    pauseRunBtn.addEventListener('click', pauseRunning);
    stopRunBtn.addEventListener('click', stopRunning);

    // Переключение упражнений
    const exBtns = document.querySelectorAll('.ex-btn');
    const runExerciseDiv = document.getElementById('runExercise');
    const quizExerciseDiv = document.getElementById('quizExercise');
    exBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            exBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (btn.dataset.ex === 'run') {
                runExerciseDiv.style.display = 'block';
                quizExerciseDiv.style.display = 'none';
                if (!wordsList.length) pickRandomText();
            } else {
                runExerciseDiv.style.display = 'none';
                quizExerciseDiv.style.display = 'block';
                if (!currentStory) loadRandomStory();
            }
        });
    });

    newTextBtn.addEventListener('click', () => loadRandomStory());
    checkQuizBtn.addEventListener('click', checkQuiz);

    // Firebase Auth
    function showAuthMessage(msg, isError = true) {
        authMessage.textContent = msg;
        authMessage.style.color = isError ? '#ff6b6b' : '#6bcf7f';
        setTimeout(() => authMessage.textContent = '', 3000);
    }

    loginBtn.addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value;
        const pwd = document.getElementById('loginPassword').value;
        if (!email || !pwd) { showAuthMessage("Введи email и пароль!"); return; }
        try {
            await signInWithEmailAndPassword(auth, email, pwd);
        } catch (err) { showAuthMessage("Ошибка: " + err.message); }
    });

    registerBtn.addEventListener('click', async () => {
        const email = document.getElementById('regEmail').value;
        const pwd = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regPasswordConfirm').value;
        if (!email || !pwd) { showAuthMessage("Заполни все поля!"); return; }
        if (pwd !== confirm) { showAuthMessage("Пароли не совпадают"); return; }
        if (pwd.length < 6) { showAuthMessage("Пароль должен быть не меньше 6 букв"); return; }
        try {
            await createUserWithEmailAndPassword(auth, email, pwd);
        } catch (err) { showAuthMessage("Ошибка: " + err.message); }
    });

    showRegPanel.addEventListener('click', () => {
        loginPanel.style.display = 'none';
        regPanel.style.display = 'block';
    });
    showLoginPanel.addEventListener('click', () => {
        regPanel.style.display = 'none';
        loginPanel.style.display = 'block';
    });
    logoutBtn.addEventListener('click', async () => { await signOut(auth); });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            authScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            userNameSpan.textContent = user.email.split('@')[0] + " 🐣";
            pickRandomText();
            loadRandomStory();
        } else {
            authScreen.style.display = 'block';
            gameScreen.style.display = 'none';
            loginPanel.style.display = 'block';
            regPanel.style.display = 'none';
        }
    });
</script>
</body>
</html>
